# Windows + macOS validation.
# Dispatch-triggered on purpose: macOS burns 10× CI minutes on a private repo,
# so these run when asked (portability iterations, releases), not on every PR.
# `installers: true` additionally produces unsigned installer artifacts.
name: Cross-platform

on:
  schedule:
    # Weekly macOS+Windows sweep. Public repo → hosted minutes are free.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      installers:
        description: "Also build unsigned Windows/macOS installers (slow)"
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: "10"
  RUSTUP_MAX_RETRIES: "10"

jobs:
  engine:
    name: Engine · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # lecternd is unix-socket based; on Windows validate engine + CLI only.
      - name: Check + test (Windows scope)
        if: runner.os == 'Windows'
        run: |
          cargo check -p lectern-engine -p lectern -p lecternd --locked
          cargo test -p lectern-engine -p lectern -p lecternd --locked
      - name: Build daemon (Windows)
        if: runner.os == 'Windows'
        run: cargo build -p lecternd --locked
      # P3a slice: the daemon session loop natively on Windows (tcp+token transport).
      - name: Daemon smoke (Windows)
        if: runner.os == 'Windows'
        run: python scripts/daemon-smoke.py
      - name: Check + test (macOS scope)
        if: runner.os == 'macOS'
        run: |
          cargo check --workspace --locked
          cargo test --workspace --locked
      - name: Build daemon (macOS)
        if: runner.os == 'macOS'
        run: cargo build -p lecternd --locked
      # P2b: unix-socket daemon loop validated on macOS.
      - name: Daemon smoke (macOS)
        if: runner.os == 'macOS'
        run: python3 scripts/daemon-smoke.py

  installer:
    name: Installer · ${{ matrix.os }}
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.installers }}
    needs: engine
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Frontend deps
        working-directory: apps/desktop
        run: npm ci
      # tauri.conf.json pins Linux targets (deb/appimage) — override per OS,
      # otherwise Win/Mac compile but skip bundling and upload nothing.
      - name: Tauri build (unsigned, Windows)
        if: runner.os == 'Windows'
        working-directory: apps/desktop
        run: npx tauri build --bundles nsis
      - name: Tauri build (unsigned, macOS)
        if: runner.os == 'macOS'
        working-directory: apps/desktop
        run: npx tauri build --bundles dmg
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lectern-${{ runner.os }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  app-smoke:
    name: App launch · ${{ matrix.os }}
    needs: engine
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Frontend
        working-directory: apps/desktop
        run: |
          npm ci
          npm run build
      - name: Build app (debug, no bundling)
        working-directory: apps/desktop/src-tauri
        run: cargo build --locked
      # Ports P3a/P3b: LECTERN_SMOKE=1 exits 0 iff the window+webview actually
      # constructed on this OS. Runner desktops (Windows session / macOS
      # WindowServer) are real enough for this; deeper interaction testing
      # stays a documented limit (P3c is the human pass).
      - name: Launch smoke (Windows)
        if: runner.os == 'Windows'
        working-directory: apps/desktop/src-tauri
        shell: pwsh
        run: |
          $env:LECTERN_SMOKE = "1"
          ./target/debug/lectern-desktop.exe
          if ($LASTEXITCODE -ne 0) { exit 1 }
      - name: Launch smoke (macOS)
        if: runner.os == 'macOS'
        working-directory: apps/desktop/src-tauri
        run: LECTERN_SMOKE=1 ./target/debug/lectern-desktop
