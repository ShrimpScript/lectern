name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Harden against transient crates.io/registry network errors in CI.
  CARGO_NET_RETRY: "10"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  RUSTUP_MAX_RETRIES: "10"

jobs:
  engine:
    name: Engine (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Fetch dependencies
        run: cargo fetch --locked
      - name: Portability lint
        run: ./scripts/portability-lint.sh
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --offline -- -D warnings
      - name: Build
        run: cargo build --workspace --locked --offline
      - name: Test
        run: cargo test --workspace --locked --offline


  desktop-check:
    name: Desktop (Tauri bin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: Tauri system deps (hosted runners only — zeke-pc has them)
        if: runner.environment == 'github-hosted'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf libayatana-appindicator3-dev
      - name: Check the desktop binary compiles
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml --locked
