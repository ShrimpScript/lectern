<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lectern</title>
    <style>
      /* Boot splash — pure HTML/CSS so it paints the instant the webview exists,
         before ANY JavaScript. React fades it out once sessions are restored. */
      #boot-splash {
        position: fixed; inset: 0; z-index: 9999;
        background: #0f0f10; color: #f4f4f2;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px;
        transition: opacity .35s ease;
      }
      #boot-splash.gone { opacity: 0; pointer-events: none; }
      .bs-logo { width: 56px; height: 56px; }
      .bs-logo rect, .bs-logo line {
        stroke: #f4f4f2; stroke-width: 1.6; fill: none; stroke-linecap: round;
        stroke-dasharray: 200; stroke-dashoffset: 200;
        animation: bs-draw 1.1s cubic-bezier(.4,.1,.2,1) forwards;
      }
      .bs-logo line.v { animation-delay: .25s; }
      .bs-logo line.h { animation-delay: .45s; }
      @keyframes bs-draw { to { stroke-dashoffset: 0; } }
      .bs-glow {
        position: absolute; width: 220px; height: 220px; border-radius: 50%;
        background: radial-gradient(circle, rgba(244,244,242,.05), transparent 65%);
        animation: bs-pulse 2.2s ease-in-out infinite;
      }
      @keyframes bs-pulse { 0%,100% { transform: scale(.9); opacity: .6; } 50% { transform: scale(1.1); opacity: 1; } }
      .bs-dots { display: flex; gap: 7px; }
      .bs-dots span {
        width: 6px; height: 6px; border-radius: 50%; background: #77776f;
        animation: bs-dot 1.2s ease-in-out infinite;
      }
      .bs-dots span:nth-child(2) { animation-delay: .15s; }
      .bs-dots span:nth-child(3) { animation-delay: .3s; }
      @keyframes bs-dot { 0%,100% { opacity: .25; transform: translateY(0); } 40% { opacity: 1; transform: translateY(-4px); } }
      .bs-word {
        font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12.5px; letter-spacing: .16em;
        color: #77776f; text-transform: uppercase; font-weight: 600;
        animation: bs-fade 2.6s ease-in-out infinite;
      }
      @keyframes bs-fade { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) {
        .bs-logo rect, .bs-logo line { animation-duration: .01s; }
        .bs-glow, .bs-dots span, .bs-word { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash">
      <div class="bs-glow"></div>
      <svg class="bs-logo" viewBox="0 0 32 32" aria-hidden="true">
        <rect x="3" y="3" width="26" height="26" rx="5"></rect>
        <line class="v" x1="16" y1="9" x2="16" y2="22"></line>
        <line class="h" x1="10" y1="22" x2="22" y2="22"></line>
      </svg>
      <div class="bs-dots"><span></span><span></span><span></span></div>
      <div class="bs-word">waking the brain</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
